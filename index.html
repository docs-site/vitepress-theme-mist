\",\"tagline\":\"My great project tagline\",\"actions\":[{\"theme\":\"brand\",\"text\":\"开发\",\"link\":\"/sdoc/01-开发/\"},{\"theme\":\"alt\",\"text\":\"组件\",\"link\":\"/sdoc/02-组件/\"}],\"image\":{\"src\":\"/images/blog.svg\",\"alt\":\"VitePress\"}},\"features\":[{\"icon\":\"📋\",\"title\":\"VitePress\",\"details\":\"由 Vite 和 Vue 驱动的静态站点生成器\",\"link\":\"https://vitejs.cn/vitepress/\"},{\"icon\":\"📋\",\"title\":\"苏木\",\"details\":\"苏木的学习笔记\",\"link\":\"https://sumumm.github.io/\"},{\"icon\":\"📝\",\"title\":\"site-hexo\",\"details\":\"苏木的hexo site\",\"link\":\"https://docs-site.github.io/site-hexo/\"}]},\"author\":{\"name\":\"苏木\"},\"title\":\"\",\"date\":\"2025-08-30 14:18:29\",\"capture\":\"\"},{\"url\":\"/sdoc/01-开发/LV01-pnpm工作区.html\",\"relativePath\":\"/sdoc/01-开发/LV01-pnpm工作区.html\",\"frontmatter\":{\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a306a8b07a\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"306a8b07a8dc4a7aaef1c4854247aea9\",\"useduuid\":\"306a8b07a\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、工作区\\n\\npnpm 内置了对单一存储库（也称为多包存储库、多项目存储库或整体存储库）的支持。你可以创建一个工作区来将多个项目联合到一个存储库中。\\n&gt; 工作区的根目录中必须有一个 `pnpm-workspace.yaml` 文件。\\n 1. 工作区协议\\n如果 linkWorkspacePackages 设置为 `true`，如果可用包与声明的范围匹配，pnpm 将从工作区链接包。例如，如果 `bar` 在其依赖中有 `\\\"foo\\\": \\\"^1.0.0\\\"` 并且 `foo@1.0.0` 在工作区中，则 `foo@1.0.0` 链接到 `bar`。但是，如果 `bar` 在依赖中有 `\\\"foo\\\"\"},{\"url\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"relativePath\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"frontmatter\":{\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a72a610880\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"72a6108807af4d71b279ba4354e1c2c4\",\"useduuid\":\"72a610880\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、Typescript路径映射\\nTypescript 路径映射（Path Mapping）是一种允许开发者在导入模块时使用自定义路径别名而不是相对路径的功能。这使得代码更加清晰、易于维护，并且在重构项目结构时更加方便。\\n 1. 基本概念\\n路径映射通过在 `tsconfig.json` 文件中配置 `paths` 和 `baseUrl` 来实现。`baseUrl` 指定了非相对路径模块的基础目录，`paths` 则定义了路径别名与实际路径之间的映射关系。\\n路径映射的核心价值在于解决深层嵌套目录结构中的导入问题。当项目变得复杂时，相对路径可能会变成类似 `../../../../utils/he\"},{\"url\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"relativePath\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"frontmatter\":{\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337b7e2aed53f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"7e2aed53fb6447bd82624cebcf46b566\",\"useduuid\":\"7e2aed53f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"一、开发指南\\n主题的主入口文件为`packages/mist/index.ts`，这里的index.ts将会在vitepress站点的`.vitepress/theme/index.ts`中导入和调用。\\n 二、Workspace 机制详解\\n 1. 项目配置分析\\n 1.1 pnpm-workspace.yaml\\n```yaml\\n pnpm-workspace.yaml\\npackages:\\n  - docs\\n  - packages/*\\n```\\n这个配置定义了 Workspace 的范围，包含了 `packages` 目录下的所有子目录。\\n 1.2 packages/mist/package.js\"},{\"url\":\"/sdoc/01-开发/LV04-主题配置.html\",\"relativePath\":\"/sdoc/01-开发/LV04-主题配置.html\",\"frontmatter\":{\"title\":\"LV04-主题配置\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337ca417da777\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"m \"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"e04f52cc57f94bf0a64876f234687634\",\"useduuid\":\"e04f52cc5\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Git 提交规范与工具集成\\n在现代前端开发中，规范化的 Git 提交信息对于项目维护和版本管理至关重要。本文将详细介绍 husky、cz-git 和 @commitlint/cli 三个工具的使用方法，以及如何建立一套完整的 Git 提交规范体系。\\n\\n 一、Husky - Git 钩子工具\\n 1. 简介\\nHusky 是一个现代化的 Git 钩子管理工具，它允许我们在 Git 的各个生命周期节点（如 pre-commit、commit-msg 等）执行自定义脚本。通过 Husky，我们可以自动化执行代码检查、测试、提交信息验证等任务。\\n&gt; Git仓库：GitHub - typicode/h\"},{\"url\":\"/sdoc/01-开发/LV09-standard-version.html\",\"relativePath\":\"/sdoc/01-开发/LV09-standard-version.html\",\"frontmatter\":{\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6338009322f86c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"09322f86c448437ca5a97e886e27ca76\",\"useduuid\":\"09322f86c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Standard-Version 自动生成CHANGELOG.md\\n 一、Standard-Version是什么\\n 1. 简介\\nStandard-Version是一款遵循语义化版本（semver）和commit message标准规范的版本和Changelog自动化工具。它基于commit类型来自动更新版本号，例如新功能（feature）会更新次要版本号（minor），修复错误（bug fix）会更新补丁版本号（patch），而破坏性更改（BREAKING CHANGES）则会更新主要版本号（major）。这意味着开发者只需要专注于开发，而不需要担心版本号和Changelog的更新。\\n要使用S\"},{\"url\":\"/sdoc/01-开发/LV10-changesets.html\",\"relativePath\":\"/sdoc/01-开发/LV10-changesets.html\",\"frontmatter\":{\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf63381686cffc03\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":nu "capture\":\"这里建立vitepress时的示例文档。\"},{\"url\":\"/Examples/markdown-examples.html\",\"relativePath\":\"/Examples/markdown-examples.html\",\"frontmatter\":{},\"author\":{\"name\":\"苏木\"},\"title\":\"Markdown Extension Examples\",\"date\":\"2025-08-30 14:18:29\",\"capture\":\"This page demonstrates some of the built-in markdown extensions provided by VitePress.\\n Syntax Highlighting\\nVitePress provides Syntax Highlighting powered by Shiki, with additional features like line-highlighting:\\nInput\\n````md\\n```js{4}\\nexport default {\\n  data () {\\n    return {\\n      msg: 'Highlighte\"},{\"url\":\"/sdoc/01-开发/LV01-pnpm工作区.html\",\"relativePath\":\"/sdoc/01-开发/LV01-pnpm工作区.html\",\"frontmatter\":{\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a306a8b07a\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"306a8b07a8dc4a7aaef1c4854247aea9\",\"useduuid\":\"306a8b07a\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、工作区\\n\\npnpm 内置了对单一存储库（也称为多包存储库、多项目存储库或整体存储库）的支持。你可以创建一个工作区来将多个项目联合到一个存储库中。\\n&gt; 工作区的根目录中必须有一个 `pnpm-workspace.yaml` 文件。\\n 1. 工作区协议\\n如果 linkWorkspacePackages 设置为 `true`，如果可用包与声明的范围匹配，pnpm 将从工作区链接包。例如，如果 `bar` 在其依赖中有 `\\\"foo\\\": \\\"^1.0.0\\\"` 并且 `foo@1.0.0` 在工作区中，则 `foo@1.0.0` 链接到 `bar`。但是，如果 `bar` 在依赖中有 `\\\"foo\\\"\"},{\"url\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"relativePath\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"frontmatter\":{\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a72a610880\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"72a6108807af4d71b279ba4354e1c2c4\",\"useduuid\":\"72a610880\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、Typescript路径映射\\nTypescript 路径映射（Path Mapping）是一种允许开发者在导入模块时使用自定义路径别名而不是相对路径的功能。这使得代码更加清晰、易于维护，并且在重构项目结构时更加方便。\\n 1. 基本概念\\n路径映射通过在 `tsconfig.json` 文件中配置 `paths` 和 `baseUrl` 来实现。`baseUrl` 指定了非相对路径模块的基础目录，`paths` 则定义了路径别名与实际路径之间的映射关系。\\n路径映射的核心价值在于解决深层嵌套目录结构中的导入问题。当项目变得复杂时，相对路径可能会变成类似 `../../../../utils/he\"},{\"url\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"relativePath\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"frontmatter\":{\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337b7e2aed53f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"7e2aed53fb6447bd82624cebcf46b566\",\"useduuid\":\"7e2aed53f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"一、开发指南\\n主题的主入口文件为`packages/mist/index.ts`，这里的index.ts将会在vitepress站点的`.vitepress/theme/index.ts`中导入和调用。\\n 二、Workspace 机制详解\\n 1. 项目配置分析\\n 1.1 pnpm-workspace.yaml\\n```yaml\\n pnpm-workspace.yaml\\npackages:\\n  - docs\\n  - packages/*\\n```\\n这个配置定义了 Workspace 的范围，包含了 `packages` 目录下的所有子目录。\\n 1.2 packages/mist/package.js\"},{\"url\":\"/sdoc/01-开发/LV04-主题配置.html\",\"relativePath\":\"/sdoc/01-开发/LV04-主题配置.html\",\"frontmatter\":{\"title\":\"LV04-主题配置\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337ca417da777\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a417da777986478ca88a7f8a4aeb613e\",\"useduuid\":\"a417da777\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV04-主题配置\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"<p>vitepress的配置合并。</p>\\n\",\"capture\":\"vitepress的配置合并。\\n 一、概述\\n当建立一个vitepress站点后，得到的默认配置文件如下：\\n```typescript\\nimport { defineConfig } from 'vitepress'\\n// https://vitepress.dev/reference/site-config\\nexport default defineConfig({\\n  title: \\\"mist docs\\\",\\n  description: \\\"vitepress-theme-mist docs\\\",\\n  themeConfig: {\\n    // https://vitepress.dev/ref\"},{\"url\":\"/sdoc/01-开发/LV05-DataLoader组件分析.html\",\"relativePath\":\"/sdoc/01-开发/LV05-DataLoader组件分析.html\",\"frontmatter\":{\"title\":\"LV05-DataLoader组件分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337dbe16093e2\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"be16093e26c94f5bb9cdb4d84767c30c\",\"useduuid\":\"be16093e2\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV05-DataLoader组件分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"DataLoader 组件导入过程分析\\n 概述\\n本文档详细分析了 DataLoader 组件在项目中的目录结构、各文件作用以及从组件实现到最终在 `@docs-site/vitepress-theme-mist` 主题中注册的完整导入链路。\\n 1. 目录结构分析\\n 1.1 目录结构\\n```bash\\n📁 DataLoader/\\n├── 📄 index.ts                    组件主入口文件\\n├── 📁 src/\\n│   ├── 📄 DataLoader.vue          组件实现文件\\n│   ├── 📄 DataLoader.ts           类型定\"},{\"url\":\"/sdoc/01-开发/LV06-SCSS变量未展开问题分析.html\",\"relativePath\":\"/sdoc/01-开发/LV06-SCSS变量未展开问题分析.html\",\"frontmatter\":{\"title\":\"LV06-SCSS变量未展开问题分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337eb840fdd0c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"b840fdd0c70b48a3bc5e1e4e1caf63f9\",\"useduuid\":\"b840fdd0c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV06-SCSS变量未展开问题分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"SCSS变量未展开问题分析\\n 一、问题描述\\n在 `packages\\\\theme-chalk\\\\src\\\\var\\\\theme-color.scss` 文件中，第46-51行的代码：\\n```scss\\nhtml[theme-color=\\\"ep-blue\\\"] {\\n  --vp-c-brand-1: {getCssVar(\\\"el-color-primary\\\")};\\n  --vp-c-brand-2: {getCssVar(\\\"el-color-primary-light-3\\\")};\\n  --vp-c-brand-3: {getCssVar(\\\"el-color-primary-light-5\\\")};\\n  --v\"},{\"url\":\"/sdoc/01-开发/LV07-Vite插件.html\",\"relativePath\":\"/sdoc/01-开发/LV07-Vite插件.html\",\"frontmatter\":{\"title\":\"LV07-Vite插件\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337e8d3eeda2f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"8d3eeda2fbae4a0fab1a34b7af8197a9\",\"useduuid\":\"8d3eeda2f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV07-Vite插件\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"VitePress 处于 Vite 环境下，因此天然支持 Vite 插件。\\n 一、Vite 插件基础模板\\n首先介绍 Vite 插件的基础模板：\\n```ts\\nimport type { Plugin } from \\\"vite\\\";\\ninterface Options {\\n  // ...\\n}\\nexport default function VitePluginVitePressTemplate(option: Options = {}): Plugin {\\n  return {\\n    name: \\\"vite-plugin-vitepress-template\\\",\\n    // ...\\n  };\\n\"},{\"url\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"relativePath\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"frontmatter\":{\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337fe04f52cc5\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"e04f52cc57f94bf0a64876f234687634\",\"useduuid\":\"e04f52cc5\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Git 提交规范与工具集成\\n在现代前端开发中，规范化的 Git 提交信息对于项目维护和版本管理至关重要。本文将详细介绍 husky、cz-git 和 @commitlint/cli 三个工具的使用方法，以及如何建立一套完整的 Git 提交规范体系。\\n\\n 一、Husky - Git 钩子工具\\n 1. 简介\\nHusky 是一个现代化的 Git 钩子管理工具，它允许我们在 Git 的各个生命周期节点（如 pre-commit、commit-msg 等）执行自定义脚本。通过 Husky，我们可以自动化执行代码检查、测试、提交信息验证等任务。\\n&gt; Git仓库：GitHub - typicode/h\"},{\"url\":\"/sdoc/01-开发/LV09-standard-version.html\",\"relativePath\":\"/sdoc/01-开发/LV09-standard-version.html\",\"frontmatter\":{\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6338009322f86c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"09322f86c448437ca5a97e886e27ca76\",\"useduuid\":\"09322f86c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Standard-Version 自动生成CHANGELOG.md\\n 一、Standard-Version是什么\\n 1. 简介\\nStandard-Version是一款遵循语义化版本（semver）和commit message标准规范的版本和Changelog自动化工具。它基于commit类型来自动更新版本号，例如新功能（feature）会更新次要版本号（minor），修复错误（bug fix）会更新补丁版本号（patch），而破坏性更改（BREAKING CHANGES）则会更新主要版本号（major）。这意味着开发者只需要专注于开发，而不需要担心版本号和Changelog的更新。\\n要使用S\"},{\"url\":\"/sdoc/01-开发/LV10-changesets.html\",\"relativePath\":\"/sdoc/01-开发/LV10-changesets.html\",\"frontmatter\":{\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf63381686cffc03\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"686cffc0301849948414523a2f507d1d\",\"useduuid\":\"686cffc03\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Changesets 自动生成CHANGELOG.md\\n 一、Changesets是什么\\n 1. 简介\\nChangesets 是一个专为 monorepo 项目设计的版本管理和变更日志生成工具。与 Standard-Version 不同，Changesets 采用手动创建变更集（changeset）的方式，让开发者能够精确控制每个版本包含的变更内容。它特别适合多包管理的复杂项目，提供更灵活的版本控制策略。\\nChangesets 的核心思想是\\\"变更集驱动\\\"——开发者需要手动创建变更集文件来描述所做的更改，然后工具会根据这些变更集自动更新版本号、生成变更日志，并处理包之间的依赖关系。\\n核心特点：\\n\"},{\"url\":\"/sdoc/01-开发/\",\"relativePath\":\"/sdoc/01-开发/\",\"frontmatter\":{\"title\":\"开发\",\"date\":\"2025-08-30 22:11:55\",\"permalink\":\"/docs/126b038aaf6336ea02ae0375\",\"icon\":\"laptop-code\",\"layout\":\"page\",\"catalogue\":true,\"path\":\"sdoc/01-开发\",\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a02ae03759f5413bb957056168894f57\",\"useduuid\":\"a02ae0375\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"开发\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"这里是主题开发过程中的一些笔记。\"},{\"url\":\"/sdoc/02-组件/01-公共组件/LV01-DataLoader数据加载.html\",\"relativePath\":\"/sdoc/02-组件/01-公共组件/LV01-DataLoader数据加载.html\",\"frontmatter\":{\"title\":\"LV01-DataLoader数据加载\",\"date\":\"2025-08-30 22:13:20\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038ab0082f1a90bf2325\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a90bf2325c1e42e8beeb62017bc9200c\",\"useduuid\":\"a90bf2325\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV01-DataLoader数据加载\",\"date\":\"2025-08-30 22:13:20\",\"excerpt\":\"\",\"capture\":\"&lt;script setup\\nimport { MtDataLoader } from \\\"vitepress-theme-mist\\\"\\n&lt;/script&gt;\\n 简介\\n第一个组件，主要是学习组件的写法和用法。\\n 基本用法\\n在 Markdown文档中添加以下内容：\\n```markdown\\n&lt;MtDataLoader /&gt;\\n```\\n 效果\\n&lt;MtDataLoader /&gt;\"},{\"url\":\"/sdoc/02-组件/01-公共组件/LV02-BackTop回到顶部.html\",\"relativePath\":\"/sdoc/02-组件/01-公共组件/LV02-BackTop回到顶部.html\",\"frontmatter\":{\"title\":\"LV02 \":\"2025-08-30 22:13:20\",\"permalink\":\"/docs/126b038ab0082ed30ea2d9af\",\"icon\":\"laptop-code\",\"layout\":\"page\",\"catalogue\":true,\"path\":\"sdoc/02-组件/01-公共组件\",\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"30ea2d9af6ed4210947b26354249fc79\",\"useduuid\":\"30ea2d9af\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"公共组件\",\"date\":\"2025-08-30 22:13:20\",\"capture\":\"这里是编写的所有公共组件的使用文档。\"},{\"url\":\"/sdoc/03-插件/\",\"relativePath\":\"/sdoc/03-插件/\",\"frontmatter\":{\"title\":\"插件\",\"date\":\"2025-08-30 22:12:56\",\"permalink\":\"/docs/126b038aafc83d24e01c45a4\",\"icon\":\"laptop-code\",\"layout\":\"page\",\"catalogue\":true,\"path\":\"sdoc/03-插件\",\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"4e01c45a421e4bf8956878f3ce47b69f\",\"useduuid\":\"4e01c45a4\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"插件\",\"date\":\"2025-08-30 22:12:56\",\"capture\":\"这里一些插件文档。\"},{\"url\":\"/sdoc/03-插件/LV01-file-content-loader.html\",\"relativePath\":\"/sdoc/03-插件/LV01-file-content-loader.html\",\"frontmatter\":{\"title\":\"LV01-file-content-loader\",\"date\":\"2025-08-30 22:12:46\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aafbe288e3c883da7\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"e3c883da7860440b9619f6194c57b185\",\"useduuid\":\"e3c883da7\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV01-file-content-loader\",\"date\":\"2025-08-30 22:12:46\",\"capture\":\"vitepress-plugin-file-content-loader\\n 一、概述\\n`vitepress-plugin-file-content-loader` 是 Teek 主题生态系统中的一个重要插件，专门用于在 VitePress 项目构建时扫描和处理指定的文件内容。该插件将 VitePress 官方的构建时数据加载功能封装成独立的插件形式，使开发者能够更便捷地获取和处理项目中的 Markdown 文件内容。\\n本文将围绕其设计思路、技术实现、配置选项以及与其他组件间的协作机制展开全面剖析。\\n 二、基本功能\\n 1. 文件内容扫描与处理\\n- 在 VitePress 启动时扫描项目中指定的文\"},{\"url\":\"/sdoc/03-插件/LV02-catalogue分析文档.html\",\"relativePath\":\"/sdoc/03-插件/LV02-catalogue分析文档.html\",\"frontmatter\":{\"title\":\"LV02-catalogue分析文档\",\"date\":\"2025-08-30 22:12:46\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aafbe289291cd52cc\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"291cd52cc5e642808cbe11a806f445fa\",\"useduuid\":\"291cd52cc\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV02-catalogue分析文档\",\"date\":\"2025-08-30 22:12:46\",\"capture\":\"vitepress-plugin-catalogue 插件深度解析\\n 一、概述\\n`vitepress-plugin-catalogue` 是 Teek 主题生态系统中的一个重要插件，专门用于在 VitePress 项目构建时扫描 Markdown 文档并生成目录信息。该插件能够自动识别标记为目录页的文档，并为其生成结构化的目录数据，便于开发者创建美观实用的目录页面。\\n本文将围绕其设计思路、技术实现、配置选项以及与其他组件间的协作机制展开全面剖析。\\n 二、基本功能\\n 1. 目录数据自动生成\\n- 在 VitePress 启动时扫描项目中的 Markdown 文档\\n- 识别具有 `catalogue\"},{\"url\":\"/sdoc/03-插件/LV03-永久链接.html\",\"relativePath\":\"/sdoc/03-插件/LV03-永久链接.html\",\"frontmatter\":{\"title\":\"LV03-永久链接\",\"date\":\"2025-08-30 22:12:46\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aafbe28a927e01447\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"927e01447305406a834f99decb73190a\",\"useduuid\":null}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV03-永久链接\",\"date\":\"2025-08-30 22:12:46\",\"capture\":\"vitepress-plugin-permalink\\n`vitepress-plugin-permalink` 是一个适用于 VitePress 的 Vite 插件，用于实现永久链接（Permalink）功能。它允许用户为 Markdown 文档设置唯一的访问链接，即使文档路径发生移动，访问地址也不会发生变化。\\n 一、工作原理\\n插件提供两种方式实现永久链接：\\n 1. Proxy 方式\\n这种方式不会影响文件路径，而是在访问文件路径时，通过代理（拦截）将其转换为 `Permalink`。\\nProxy 方式类似于一个\\\"中间人\\\"，它在开发服务器层面拦截请求，当用户访问 permalink 时，插件会在\"},{\"url\":\"/sdoc/01-开发/LV01-pnpm工作区.html\",\"relativePath\":\"/sdoc/01-开发/LV01-pnpm工作区.html\",\"frontmatter\":{\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a306a8b07a\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"306a8b07a8dc4a7aaef1c4854247aea9\",\"useduuid\":\"306a8b07a\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、工作区\\n\\npnpm 内置了对单一存储库（也称为多包存储库、多项目存储库或整体存储库）的支持。你可以创建一个工作区来将多个项目联合到一个存储库中。\\n&gt; 工作区的根目录中必须有一个 `pnpm-workspace.yaml` 文件。\\n 1. 工作区协议\\n如果 linkWorkspacePackages 设置为 `true`，如果可用包与声明的范围匹配，pnpm 将从工作区链接包。例如，如果 `bar` 在其依赖中有 `\\\"foo\\\": \\\"^1.0.0\\\"` 并且 `foo@1.0.0` 在工作区中，则 `foo@1.0.0` 链接到 `bar`。但是，如果 `bar` 在依赖中有 `\\\"foo\\\"\"},{\"url\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"relativePath\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"frontmatter\":{\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a72a610880\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"72a6108807af4d71b279ba4354e1c2c4\",\"useduuid\":\"72a610880\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、Typescript路径映射\\nTypescript 路径映射（Path Mapping）是一种允许开发者在导入模块时使用自定义路径别名而不是相对路径的功能。这使得代码更加清晰、易于维护，并且在重构项目结构时更加方便。\\n 1. 基本概念\\n路径映射通过在 `tsconfig.json` 文件中配置 `paths` 和 `baseUrl` 来实现。`baseUrl` 指定了非相对路径模块的基础目录，`paths` 则定义了路径别名与实际路径之间的映射关系。\\n路径映射的核心价值在于解决深层嵌套目录结构中的导入问题。当项目变得复杂时，相对路径可能会变成类似 `../../../../utils/he\"},{\"url\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"relativePath\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"frontmatter\":{\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337b7e2aed53f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"7e2aed53fb6447bd82624cebcf46b566\",\"useduuid\":\"7e2aed53f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"一、开发指南\\n主题的主入口文件为`packages/mist/index.ts`，这里的index.ts将会在vitepress站点的`.vitepress/theme/index.ts`中导入和调用。\\n 二、Workspace 机制详解\\n 1. 项目配置分析\\n 1.1 pnpm-workspace.yaml\\n```yaml\\n pnpm-workspace.yaml\\npackages:\\n  - docs\\n  - packages/*\\n```\\n这个配置定义了 Workspace 的范围，包含了 `packages` 目录下的所有子目录。\\n 1.2 packages/mist/package.js\"},{\"url\":\"/sdoc/01-开发/LV04-主题配置.html\",\"relativePath\":\"/sdoc/01-开发/LV04-主题配置.html\",\"frontmatter\":{\"title\":\"LV04-主题配置\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337ca417da777\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a417da777986478ca88a7f8a4aeb613e\",\"useduuid\":\"a417da777\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV04-主题配置\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"<p>vitepress的配置合并。</p>\\n\",\"capture\":\"vitepress的配置合并。\\n 一、概述\\n当建立一个vitepress站点后，得到的默认配置文件如下：\\n```typescript\\nimport { defineConfig } from 'vitepress'\\n// https://vitepress.dev/reference/site-config\\nexport default defineConfig({\\n  title: \\\"mist docs\\\",\\n  description: \\\"vitepress-theme-mist docs\\\",\\n  themeConfig: {\\n    // https://vitepress.dev/ref\"},{\"url\":\"/sdoc/01-开发/LV05-DataLoader组件分析.html\",\"relativePath\":\"/sdoc/01-开发/LV05-DataLoader组件分析.html\",\"frontmatter\":{\"title\":\"LV05-DataLoader组件分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337dbe16093e2\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"be16093e26c94f5bb9cdb4d84767c30c\",\"useduuid\":\"be16093e2\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV05-DataLoader组件分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"DataLoader 组件导入过程分析\\n 概述\\n本文档详细分析了 DataLoader 组件在项目中的目录结构、各文件作用以及从组件实现到最终在 `@docs-site/vitepress-theme-mist` 主题中注册的完整导入链路。\\n 1. 目录结构分析\\n 1.1 目录结构\\n```bash\\n📁 DataLoader/\\n├── 📄 index.ts                    组件主入口文件\\n├── 📁 src/\\n│   ├── 📄 DataLoader.vue          组件实现文件\\n│   ├── 📄 DataLoader.ts           类型定\"},{\"url\":\"/sdoc/01-开发/LV06-SCSS变量未展开问题分析.html\",\"relativePath\":\"/sdoc/01-开发/LV06-SCSS变量未展开问题分析.html\",\"frontmatter\":{\"title\":\"LV06-SCSS变量未展开问题分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337eb840fdd0c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"b840fdd0c70b48a3bc5e1e4e1caf63f9\",\"useduuid\":\"b840fdd0c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV06-SCSS变量未展开问题分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"SCSS变量未展开问题分析\\n 一、问题描述\\n在 `packages\\\\theme-chalk\\\\src\\\\var\\\\theme-color.scss` 文件中，第46-51行的代码：\\n```scss\\nhtml[theme-color=\\\"ep-blue\\\"] {\\n  --vp-c-brand-1: {getCssVar(\\\"el-color-primary\\\")};\\n  --vp-c-brand-2: {getCssVar(\\\"el-color-primary-light-3\\\")};\\n  --vp-c-brand-3: {getCssVar(\\\"el-color-primary-light-5\\\")};\\n  --v\"},{\"url\":\"/sdoc/01-开发/LV07-Vite插件.html\",\"relativePath\":\"/sdoc/01-开发/LV07-Vite插件.html\",\"frontmatter\":{\"title\":\"LV07-Vite插件\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337e8d3eeda2f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"8d3eeda2fbae4a0fab1a34b7af8197a9\",\"useduuid\":\"8d3eeda2f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV07-Vite插件\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"VitePress 处于 Vite 环境下，因此天然支持 Vite 插件。\\n 一、Vite 插件基础模板\\n首先介绍 Vite 插件的基础模板：\\n```ts\\nimport type { Plugin } from \\\"vite\\\";\\ninterface Options {\\n  // ...\\n}\\nexport default function VitePluginVitePressTemplate(option: Options = {}): Plugin {\\n  return {\\n    name: \\\"vite-plugin-vitepress-template\\\",\\n    // ...\\n  };\\n\"},{\"url\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"relativePath\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"frontmatter\":{\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337fe04f52cc5\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"e04f52cc57f94bf0a64876f234687634\",\"useduuid\":\"e04f52cc5\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Git 提交规范与工具集成\\n在现代前端开发中，规范化的 Git 提交信息对于项目维护和版本管理至关重要。本文将详细介绍 husky、cz-git 和 @commitlint/cli 三个工具的使用方法，以及如何建立一套完整的 Git 提交规范体系。\\n\\n 一、Husky - Git 钩子工具\\n 1. 简介\\nHusky 是一个现代化的 Git 钩子管理工具，它允许我们在 Git 的各个生命周期节点（如 pre-commit、commit-msg 等）执行自定义脚本。通过 Husky，我们可以自动化执行代码检查、测试、提交信息验证等任务。\\n&gt; Git仓库：GitHub - typicode/h\"},{\"url\":\"/sdoc/01-开发/LV09-standard-version.html\",\"relativePath\":\"/sdoc/01-开发/LV09-standard-version.html\",\"frontmatter\":{\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6338009322f86c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"09322f86c448437ca5a97e886e27ca76\",\"useduuid\":\"09322f86c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Standard-Version 自动生成CHANGELOG.md\\n 一、Standard-Version是什么\\n 1. 简介\\nStandard-Version是一款遵循语义化版本（semver）和commit message标准规范的版本和Changelog自动化工具。它基于commit类型来自动更新版本号，例如新功能（feature）会更新次要版本号（minor），修复错误（bug fix）会更新补丁版本号（patch），而破坏性更改（BREAKING CHANGES）则会更新主要版本号（major）。这意味着开发者只需要专注于开发，而不需要担心版本号和Changelog的更新。\\n要使用S\"},{\"url\":\"/sdoc/01-开发/LV10-changesets.html\",\"relativePath\":\"/sdoc/01-开发/LV10-changesets.html\",\"frontmatter\":{\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf63381686cffc03\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"686cffc0301849948414523a2f507d1d\",\"useduuid\":\"686cffc03\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Changesets 自动生成CHANGELOG.md\\n 一、Changesets是什么\\n 1. 简介\\nChangesets 是一个专为 monorepo 项目设计的版本管理和变更日志生成工具。与 Standard-Version 不同，Changesets 采用手动创建变更集（changeset）的方式，让开发者能够精确控制每个版本包含的变更内容。它特别适合多包管理的复杂项目，提供更灵活的版本控制策略。\\nChangesets 的核心思想是\\\"变更集驱动\\\"——开发者需要手动创建变更集文件来描述所做的更改，然后工具会根据这些变更集自动更新版本号、生成变更日志，并处理包之间的依赖关系。\\n核心特点：\\n\"},{\"url\":\"/sdoc/01-开发/\",\"relativePath\":\"/sdoc/01-开发/\",\"frontmatter\":{\"title\":\"开发\",\"date\":\"2025-08-30 22:11:55\",\"permalink\":\"/docs/126b038aaf6336ea02ae0375\",\"icon\":\"laptop-code\",\"layout\":\"page\",\"catalogue\":true,\"path\":\"sdoc/01-开发\",\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a02ae03759f5413bb957056168894f57\",\"useduuid\":\"a02ae0375\"}},\ yright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"306a8b07a8dc4a7aaef1c4854247aea9\",\"useduuid\":\"306a8b07a\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、工作区\\n\\npnpm 内置了对单一存储库（也称为多包存储库、多项目存储库或整体存储库）的支持。你可以创建一个工作区来将多个项目联合到一个存储库中。\\n&gt; 工作区的根目录中必须有一个 `pnpm-workspace.yaml` 文件。\\n 1. 工作区协议\\n如果 linkWorkspacePackages 设置为 `true`，如果可用包与声明的范围匹配，pnpm 将从工作区链接包。例如，如果 `bar` 在其依赖中有 `\\\"foo\\\": \\\"^1.0.0\\\"` 并且 `foo@1.0.0` 在工作区中，则 `foo@1.0.0` 链接到 `bar`。但是，如果 `bar` 在依赖中有 `\\\"foo\\\"\"},{\"url\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"relativePath\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"frontmatter\":{\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a72a610880\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"72a6108807af4d71b279ba4354e1c2c4\",\"useduuid\":\"72a610880\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、Typescript路径映射\\nTypescript 路径映射（Path Mapping）是一种允许开发者在导入模块时使用自定义路径别名而不是相对路径的功能。这使得代码更加清晰、易于维护，并且在重构项目结构时更加方便。\\n 1. 基本概念\\n路径映射通过在 `tsconfig.json` 文件中配置 `paths` 和 `baseUrl` 来实现。`baseUrl` 指定了非相对路径模块的基础目录，`paths` 则定义了路径别名与实际路径之间的映射关系。\\n路径映射的核心价值在于解决深层嵌套目录结构中的导入问题。当项目变得复杂时，相对路径可能会变成类似 `../../../../utils/he\"},{\"url\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"relativePath\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"frontmatter\":{\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337b7e2aed53f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"7e2aed53fb6447bd82624cebcf46b566\",\"useduuid\":\"7e2aed53f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"一、开发指南\\n主题的主入口文件为`packages/mist/index.ts`，这里的index.ts将会在vitepress站点的`.vitepress/theme/index.ts`中导入和调用。\\n 二、Workspace 机制详解\\n 1. 项目配置分析\\n 1.1 pnpm-workspace.yaml\\n```yaml\\n pnpm-workspace.yaml\\npackages:\\n  - docs\\n  - packages/*\\n```\\n这个配置定义了 Workspace 的范围，包含了 `packages` 目录下的所有子目录。\\n 1.2 packages/mist/package.js\"},{\"url\":\"/sdoc/01-开发/LV04-主题配置.html\",\"relativePath\":\"/sdoc/01-开发/LV04-主题配置.html\",\"frontmatter\":{\"title\":\"LV04-主题配置\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337ca417da777\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a417da777986478ca88a7f8a4aeb613e\",\"useduuid\":\"a417da777\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV04-主题配置\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"<p>vitepress的配置合并。</p>\\n\",\"capture\":\"vitepress的配置合并。\\n 一、概述\\n当建立一个vitepress站点后，得到的默认配置文件如下：\\n```typescript\\nimport { defineConfig } from 'vitepress'\\n// https://vitepress.dev/reference/site-config\\nexport default defineConfig({\\n  title: \\\"mist docs\\\",\\n  description: \\\"vitepress-theme-mist docs\\\",\\n  themeConfig: {\\n    // https://vitepress.dev/ref\"},{\"url\":\"/sdoc/01-开发/LV05-DataLoader组件分析.html\",\"relativePath\":\"/sdoc/01-开发/LV05-DataLoader组件分析.html\",\"frontmatter\":{\"title\":\"LV05-DataLoader组件分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337dbe16093e2\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"be16093e26c94f5bb9cdb4d84767c30c\",\"useduuid\":\"be16093e2\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV05-DataLoader组件分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"DataLoader 组件导入过程分析\\n 概述\\n本文档详细分析了 DataLoader 组件在项目中的目录结构、各文件作用以及从组件实现到最终在 `@docs-site/vitepress-theme-mist` 主题中注册的完整导入链路。\\n 1. 目录结构分析\\n 1.1 目录结构\\n```bash\\n📁 DataLoader/\\n├── 📄 index.ts                    组件主入口文件\\n├── 📁 src/\\n│   ├── 📄 DataLoader.vue          组件实现文件\\n│   ├── 📄 DataLoader.ts           类型定\"},{\"url\":\"/sdoc/01-开发/LV06-SCSS变量未展开问题分析.html\",\"relativePath\":\"/sdoc/01-开发/LV06-SCSS变量未展开问题分析.html\",\"frontmatter\":{\"title\":\"LV06-SCSS变量未展开问题分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337eb840fdd0c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"b840fdd0c70b48a3bc5e1e4e1caf63f9\",\"useduuid\":\"b840fdd0c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV06-SCSS变量未展开问题分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"SCSS变量未展开问题分析\\n 一、问题描述\\n在 `packages\\\\theme-chalk\\\\src\\\\var\\\\theme-color.scss` 文件中，第46-51行的代码：\\n```scss\\nhtml[theme-color=\\\"ep-blue\\\"] {\\n  --vp-c-brand-1: {getCssVar(\\\"el-color-primary\\\")};\\n  --vp-c-brand-2: {getCssVar(\\\"el-color-primary-light-3\\\")};\\n  --vp-c-brand-3: {getCssVar(\\\"el-color-primary-light-5\\\")};\\n  --v\"},{\"url\":\"/sdoc/01-开发/LV07-Vite插件.html\",\"relativePath\":\"/sdoc/01-开发/LV07-Vite插件.html\",\"frontmatter\":{\"title\":\"LV07-Vite插件\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337e8d3eeda2f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"8d3eeda2fbae4a0fab1a34b7af8197a9\",\"useduuid\":\"8d3eeda2f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV07-Vite插件\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"VitePress 处于 Vite 环境下，因此天然支持 Vite 插件。\\n 一、Vite 插件基础模板\\n首先介绍 Vite 插件的基础模板：\\n```ts\\nimport type { Plugin } from \\\"vite\\\";\\ninterface Options {\\n  // ...\\n}\\nexport default function VitePluginVitePressTemplate(option: Options = {}): Plugin {\\n  return {\\n    name: \\\"vite-plugin-vitepress-template\\\",\\n    // ...\\n  };\\n\"},{\"url\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"relativePath\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"frontmatter\":{\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337fe04f52cc5\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"e04f52cc57f94bf0a64876f234687634\",\"useduuid\":\"e04f52cc5\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Git 提交规范与工具集成\\n在现代前端开发中，规范化的 Git 提交信息对于项目维护和版本管理至关重要。本文将详细介绍 husky、cz-git 和 @commitlint/cli 三个工具的使用方法，以及如何建立一套完整的 Git 提交规范体系。\\n\\n 一、Husky - Git 钩子工具\\n 1. 简介\\nHusky 是一个现代化的 Git 钩子管理工具，它允许我们在 Git 的各个生命周期节点（如 pre-commit、commit-msg 等）执行自定义脚本。通过 Husky，我们可以自动化执行代码检查、测试、提交信息验证等任务。\\n&gt; Git仓库：GitHub - typicode/h\"},{\"url\":\"/sdoc/01-开发/LV09-standard-version.html\",\"relativePath\":\"/sdoc/01-开发/LV09-standard-version.html\",\"frontmatter\":{\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6338009322f86c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"09322f86c448437ca5a97e886e27ca76\",\"useduuid\":\"09322f86c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Standard-Version 自动生成CHANGELOG.md\\n 一、Standard-Version是什么\\n 1. 简介\\nStandard-Version是一款遵循语义化版本（semver）和commit message标准规范的版本和Changelog自动化工具。它基于commit类型来自动更新版本号，例如新功能（feature）会更新次要版本号（minor），修复错误（bug fix）会更新补丁版本号（patch），而破坏性更改（BREAKING CHANGES）则会更新主要版本号（major）。这意味着开发者只需要专注于开发，而不需要担心版本号和Changelog的更新。\\n要使用S\"},{\"url\":\"/sdoc/01-开发/LV10-changesets.html\",\"relativePath\":\"/sdoc/01-开发/LV10-changesets.html\",\"frontmatter\":{\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf63381686cffc03\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"686cffc0301849948414523a2f507d1d\",\"useduuid\":\"686cffc03\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Changesets 自动生成CHANGELOG.md\\n 一、Changesets是什么\\n 1. 简介\\nChangesets 是一个专为 monorepo 项目设计的版本管理和变更日志生成工具。与 Standard-Version 不同，Changesets 采用手动创建变更集（changeset）的方式，让开发者能够精确控制每个版本包含的变更内容。它特别适合多包管理的复杂项目，提供更灵活的版本控制策略。\\nChangesets 的核心思想是\\\"变更集驱动\\\"——开发者需要手动创建变更集文件来描述所做的更改，然后工具会根据这些变更集自动更新版本号、生成变更日志，并处理包之间的依赖关系。\\n核心特点：\\n\"},{\"url\":\"/sdoc/01-开发/\",\"relativePath\":\"/sdoc/01-开发/\",\"frontmatter\":{\"title\":\"开发\",\"date\":\"2025-08-30 22:11:55\",\"permalink\":\"/docs/126b038aaf6336ea02ae0375\",\"icon\":\"laptop-code\",\"layout\":\"page\",\"catalogue\":true,\"path\":\"sdoc/01-开发\",\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a02ae03759f5413bb957056168894f57\",\"useduuid\":\"a02ae0375\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"开发\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"这里是主题开发过程 ":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"306a8b07a8dc4a7aaef1c4854247aea9\",\"useduuid\":\"306a8b07a\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、工作区\\n\\npnpm 内置了对单一存储库（也称为多包存储库、多项目存储库或整体存储库）的支持。你可以创建一个工作区来将多个项目联合到一个存储库中。\\n&gt; 工作区的根目录中必须有一个 `pnpm-workspace.yaml` 文件。\\n 1. 工作区协议\\n如果 linkWorkspacePackages 设置为 `true`，如果可用包与声明的范围匹配，pnpm 将从工作区链接包。例如，如果 `bar` 在其依赖中有 `\\\"foo\\\": \\\"^1.0.0\\\"` 并且 `foo@1.0.0` 在工作区中，则 `foo@1.0.0` 链接到 `bar`。但是，如果 `bar` 在依赖中有 `\\\"foo\\\"\"},{\"url\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"relativePath\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"frontmatter\":{\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a72a610880\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"72a6108807af4d71b279ba4354e1c2c4\",\"useduuid\":\"72a610880\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、Typescript路径映射\\nTypescript 路径映射（Path Mapping）是一种允许开发者在导入模块时使用自定义路径别名而不是相对路径的功能。这使得代码更加清晰、易于维护，并且在重构项目结构时更加方便。\\n 1. 基本概念\\n路径映射通过在 `tsconfig.json` 文件中配置 `paths` 和 `baseUrl` 来实现。`baseUrl` 指定了非相对路径模块的基础目录，`paths` 则定义了路径别名与实际路径之间的映射关系。\\n路径映射的核心价值在于解决深层嵌套目录结构中的导入问题。当项目变得复杂时，相对路径可能会变成类似 `../../../../utils/he\"},{\"url\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"relativePath\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"frontmatter\":{\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337b7e2aed53f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\ "8d3eeda2fbae4a0fab1a34b7af8197a9\",\"useduuid\":\"8d3eeda2f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV07-Vite插件\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"VitePress 处于 Vite 环境下，因此天然支持 Vite 插件。\\n 一、Vite 插件基础模板\\n首先介绍 Vite 插件的基础模板：\\n```ts\\nimport type { Plugin } from \\\"vite\\\";\\ninterface Options {\\n  // ...\\n}\\nexport default function VitePluginVitePressTemplate(option: Options = {}): Plugin {\\n  return {\\n    name: \\\"vite-plugin-vitepress-template\\\",\\n    // ...\\n  };\\n\"},{\"url\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"relativePath\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"frontmatter\":{\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337fe04f52cc5\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"e04f52cc57f94bf0a64876f234687634\",\"useduuid\":\"e04f52cc5\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Git 提交规范与工具集成\\n在现代前端开发中，规范化的 Git 提交信息对于项目维护和版本管理至关重要。本文将详细介绍 husky、cz-git 和 @commitlint/cli 三个工具的使用方法，以及如何建立一套完整的 Git 提交规范体系。\\n\\n 一、Husky - Git 钩子工具\\n 1. 简介\\nHusky 是一个现代化的 Git 钩子管理工具，它允许我们在 Git 的各个生命周期节点（如 pre-commit、commit-msg 等）执行自定义脚本。通过 Husky，我们可以自动化执行代码检查、测试、提交信息验证等任务。\\n&gt; Git仓库：GitHub - typicode/h\"},{\"url\":\"/sdoc/01-开发/LV09-standard-version.html\",\"relativePath\":\"/sdoc/01-开发/LV09-standard-version.html\",\"frontmatter\":{\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6338009322f86c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"09322f86c448437ca5a97e886e27ca76\",\"useduuid\":\"09322f86c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Standard-Version 自动生成CHANGELOG.md\\n 一、Standard-Version是什么\\n 1. 简介\\nStandard-Version是一款遵循语义化版本（semver）和commit message标准规范的版本和Changelog自动化工具。它基于commit类型来自动更新版本号，例如新功能（feature）会更新次要版本号（minor），修复错误（bug fix）会更新补丁版本号（patch），而破坏性更改（BREAKING CHANGES）则会更新主要版本号（major）。这意味着开发者只需要专注于开发，而不需要担心版本号和Changelog的更新。\\n要使用S\"},{\"url\":\"/sdoc/01-开发/LV10-changesets.html\",\"relativePath\":\"/sdoc/01-开发/LV10-changesets.html\",\"frontmatter\":{\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf63381686cffc03\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"686cffc0301849948414523a2f507d1d\",\"useduuid\":\"686cffc03\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Changesets 自动生成CHANGELOG.md\\n 一、Changesets是什么\\n 1. 简介\\nChangesets 是一个专为 monorepo 项目设计的版本管理和变更日志生成工具。与 Standard-Version 不同，Changesets 采用手动创建变更集（changeset）的方式，让开发者能够精确控制每个版本包含的变更内容。它特别适合多包管理的复杂项目，提供更灵活的版本控制策略。\\nChangesets 的核心思想是\\\"变更集驱动\\\"——开发者需要手动创建变更集文件来描述所做的更改，然后工具会根据这些变更集自动更新版本号、生成变更日志，并处理包之间的依赖关系。\\n核心特点：\\n\"},{\"url\":\"/sdoc/01-开发/\",\"relativePath\":\"/sdoc/01-开发/\",\"frontmatter\":{\"title\":\"开发\",\"date\":\"2025-08-30 22:11:55\",\"permalink\":\"/docs/126b038aaf6336ea02ae0375\",\"icon\":\"laptop-code\",\"layout\":\"page\",\"catalogue\":true,\"path\":\"sdoc/01-开发\",\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a02ae03759f5413bb957056168894f57\",\"useduuid\":\"a02ae0375\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"开发\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"这里是主题开发过程中的一些笔记。\"},{\"url\":\"/Examples/api-examples.html\",\"relativePath\":\"/Examples/api-exam ll,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"291cd52cc5e642808cbe11a806f445fa\",\"useduuid\":\"291cd52cc\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV02-catalogue分析文档\",\"date\":\"2025-08-30 22:12:46\",\"capture\":\"vitepress-plugin-catalogue 插件深度解析\\n 一、概述\\n`vitepress-plugin-catalogue` 是 Teek 主题生态系统中的一个重要插件，专门用于在 VitePress 项目构建时扫描 Markdown 文档并生成目录信息。该插件能够自动识别标记为目录页的文档，并为其生成结构化的目录数据，便于开发者创建美观实用的目录页面。\\n本文将围绕其设计思路、技术实现、配置选项以及与其他组件间的协作机制展开全面剖析。\\n 二、基本功能\\n 1. 目录数据自动生成\\n- 在 VitePress 启动时扫描项目中的 Markdown 文档\\n- 识别具有 `catalogue\"},{\"url\":\"/sdoc/03-插件/LV03-永久链接.html\",\"relativePath\":\"/sdoc/03-插件/LV03-永久链接.html\",\"frontmatter\":{\"title\":\"LV03-永久链接\",\"date\":\"2025-08-30 22:12:46\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aafbe28a927e01447\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"927e01447305406a834f99decb73190a\",\"useduuid\":null}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV03-永久链接\",\"date\":\"2025-08-30 22:12:46\",\"capture\":\"vitepress-plugin-permalink\\n`vitepress-plugin-permalink` 是一个适用于 VitePress 的 Vite 插件，用于实现永久链接（Permalink）功能。它允许用户为 Markdown 文档设置唯一的访问链接，即使文档路径发生移动，访问地址也不会发生变化。\\n 一、工作原理\\n插件提供两种方式实现永久链接：\\n 1. Proxy 方式\\n这种方式不会影响文件路径，而是在访问文件路径时，通过代理（拦截）将其转换为 `Permalink`。\\nProxy 方式类似于一个\\\"中间人\\\"，它在开发服务器层面拦截请求，当用户访问 permalink 时，插件会在\"},{\"url\":\"/sdoc/01-开发/LV01-pnpm工作区.html\",\"relativePath\":\"/sdoc/01-开发/LV01-pnpm工作区.html\",\"frontmatter\":{\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a306a8b07a\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"306a8b07a8dc4a7aaef1c4854247aea9\",\"useduuid\":\"306a8b07a\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV01-pnpm工作区\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、工作区\\n\\npnpm 内置了对单一存储库（也称为多包存储库、多项目存储库或整体存储库）的支持。你可以创建一个工作区来将多个项目联合到一个存储库中。\\n&gt; 工作区的根目录中必须有一个 `pnpm-workspace.yaml` 文件。\\n 1. 工作区协议\\n如果 linkWorkspacePackages 设置为 `true`，如果可用包与声明的范围匹配，pnpm 将从工作区链接包。例如，如果 `bar` 在其依赖中有 `\\\"foo\\\": \\\"^1.0.0\\\"` 并且 `foo@1.0.0` 在工作区中，则 `foo@1.0.0` 链接到 `bar`。但是，如果 `bar` 在依赖中有 `\\\"foo\\\"\"},{\"url\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"relativePath\":\"/sdoc/01-开发/LV02-TS路径映射与包作用域.html\",\"frontmatter\":{\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337a72a610880\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"72a6108807af4d71b279ba4354e1c2c4\",\"useduuid\":\"72a610880\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV02-TS路径映射与包作用域\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"\",\"capture\":\"一、Typescript路径映射\\nTypescript 路径映射（Path Mapping）是一种允许开发者在导入模块时使用自定义路径别名而不是相对路径的功能。这使得代码更加清晰、易于维护，并且在重构项目结构时更加方便。\\n 1. 基本概念\\n路径映射通过在 `tsconfig.json` 文件中配置 `paths` 和 `baseUrl` 来实现。`baseUrl` 指定了非相对路径模块的基础目录，`paths` 则定义了路径别名与实际路径之间的映射关系。\\n路径映射的核心价值在于解决深层嵌套目录结构中的导入问题。当项目变得复杂时，相对路径可能会变成类似 `../../../../utils/he\"},{\"url\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"relativePath\":\"/sdoc/01-开发/LV03-主题入口分析.html\",\"frontmatter\":{\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337b7e2aed53f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"7e2aed53fb6447bd82624cebcf46b566\",\"useduuid\":\"7e2aed53f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV03-主题入口分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"一、开发指南\\n主题的主入口文件为`packages/mist/index.ts`，这里的index.ts将会在vitepress站点的`.vitepress/theme/index.ts`中导入和调用。\\n 二、Workspace 机制详解\\n 1. 项目配置分析\\n 1.1 pnpm-workspace.yaml\\n```yaml\\n pnpm-workspace.yaml\\npackages:\\n  - docs\\n  - packages/*\\n```\\n这个配置定义了 Workspace 的范围，包含了 `packages` 目录下的所有子目录。\\n 1.2 packages/mist/package.js\"},{\"url\":\"/sdoc/01-开发/LV04-主题配置.html\",\"relativePath\":\"/sdoc/01-开发/LV04-主题配置.html\",\"frontmatter\":{\"title\":\"LV04-主题配置\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337ca417da777\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a417da777986478ca88a7f8a4aeb613e\",\"useduuid\":\"a417da777\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV04-主题配置\",\"date\":\"2025-08-30 22:11:55\",\"excerpt\":\"<p>vitepress的配置合并。</p>\\n\",\"capture\":\"vitepress的配置合并。\\n 一、概述\\n当建立一个vitepress站点后，得到的默认配置文件如下：\\n```typescript\\nimport { defineConfig } from 'vitepress'\\n// https://vitepress.dev/reference/site-config\\nexport default defineConfig({\\n  title: \\\"mist docs\\\",\\n  description: \\\"vitepress-theme-mist docs\\\",\\n  themeConfig: {\\n    // https://vitepress.dev/ref\"},{\"url\":\"/sdoc/01-开发/LV05-DataLoader组件分析.html\",\"relativePath\":\"/sdoc/01-开发/LV05-DataLoader组件分析.html\",\"frontmatter\":{\"title\":\"LV05-DataLoader组件分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337dbe16093e2\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"be16093e26c94f5bb9cdb4d84767c30c\",\"useduuid\":\"be16093e2\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV05-DataLoader组件分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"DataLoader 组件导入过程分析\\n 概述\\n本文档详细分析了 DataLoader 组件在项目中的目录结构、各文件作用以及从组件实现到最终在 `@docs-site/vitepress-theme-mist` 主题中注册的完整导入链路。\\n 1. 目录结构分析\\n 1.1 目录结构\\n```bash\\n📁 DataLoader/\\n├── 📄 index.ts                    组件主入口文件\\n├── 📁 src/\\n│   ├── 📄 DataLoader.vue          组件实现文件\\n│   ├── 📄 DataLoader.ts           类型定\"},{\"url\":\"/sdoc/01-开发/LV06-SCSS变量未展开问题分析.html\",\"relativePath\":\"/sdoc/01-开发/LV06-SCSS变量未展开问题分析.html\",\"frontmatter\":{\"title\":\"LV06-SCSS变量未展开问题分析\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337eb840fdd0c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"b840fdd0c70b48a3bc5e1e4e1caf63f9\",\"useduuid\":\"b840fdd0c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV06-SCSS变量未展开问题分析\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"SCSS变量未展开问题分析\\n 一、问题描述\\n在 `packages\\\\theme-chalk\\\\src\\\\var\\\\theme-color.scss` 文件中，第46-51行的代码：\\n```scss\\nhtml[theme-color=\\\"ep-blue\\\"] {\\n  --vp-c-brand-1: {getCssVar(\\\"el-color-primary\\\")};\\n  --vp-c-brand-2: {getCssVar(\\\"el-color-primary-light-3\\\")};\\n  --vp-c-brand-3: {getCssVar(\\\"el-color-primary-light-5\\\")};\\n  --v\"},{\"url\":\"/sdoc/01-开发/LV07-Vite插件.html\",\"relativePath\":\"/sdoc/01-开发/LV07-Vite插件.html\",\"frontmatter\":{\"title\":\"LV07-Vite插件\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337e8d3eeda2f\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"8d3eeda2fbae4a0fab1a34b7af8197a9\",\"useduuid\":\"8d3eeda2f\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV07-Vite插件\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"VitePress 处于 Vite 环境下，因此天然支持 Vite 插件。\\n 一、Vite 插件基础模板\\n首先介绍 Vite 插件的基础模板：\\n```ts\\nimport type { Plugin } from \\\"vite\\\";\\ninterface Options {\\n  // ...\\n}\\nexport default function VitePluginVitePressTemplate(option: Options = {}): Plugin {\\n  return {\\n    name: \\\"vite-plugin-vitepress-template\\\",\\n    // ...\\n  };\\n\"},{\"url\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"relativePath\":\"/sdoc/01-开发/LV08-Git提交规范与工具集成.html\",\"frontmatter\":{\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6337fe04f52cc5\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"e04f52cc57f94bf0a64876f234687634\",\"useduuid\":\"e04f52cc5\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV08-Git提交规范与工具集成\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Git 提交规范与工具集成\\n在现代前端开发中，规范化的 Git 提交信息对于项目维护和版本管理至关重要。本文将详细介绍 husky、cz-git 和 @commitlint/cli 三个工具的使用方法，以及如何建立一套完整的 Git 提交规范体系。\\n\\n 一、Husky - Git 钩子工具\\n 1. 简介\\nHusky 是一个现代化的 Git 钩子管理工具，它允许我们在 Git 的各个生命周期节点（如 pre-commit、commit-msg 等）执行自定义脚本。通过 Husky，我们可以自动化执行代码检查、测试、提交信息验证等任务。\\n&gt; Git仓库：GitHub - typicode/h\"},{\"url\":\"/sdoc/01-开发/LV09-standard-version.html\",\"relativePath\":\"/sdoc/01-开发/LV09-standard-version.html\",\"frontmatter\":{\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf6338009322f86c\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"09322f86c448437ca5a97e886e27ca76\",\"useduuid\":\"09322f86c\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV09-standard-version\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Standard-Version 自动生成CHANGELOG.md\\n 一、Standard-Version是什么\\n 1. 简介\\nStandard-Version是一款遵循语义化版本（semver）和commit message标准规范的版本和Changelog自动化工具。它基于commit类型来自动更新版本号，例如新功能（feature）会更新次要版本号（minor），修复错误（bug fix）会更新补丁版本号（patch），而破坏性更改（BREAKING CHANGES）则会更新主要版本号（major）。这意味着开发者只需要专注于开发，而不需要担心版本号和Changelog的更新。\\n要使用S\"},{\"url\":\"/sdoc/01-开发/LV10-changesets.html\",\"relativePath\":\"/sdoc/01-开发/LV10-changesets.html\",\"frontmatter\":{\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"icon\":\"famicons:logo-markdown\",\"permalink\":\"/docs/126b038aaf63381686cffc03\",\"index\":true,\"tags\":null,\"categories\":null,\"copyright\":false,\"keywords\":null,\"cover\":null,\"comments\":null,\"mathjax\":null,\"top\":null,\"description\":null,\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"686cffc0301849948414523a2f507d1d\",\"useduuid\":\"686cffc03\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"LV10-changesets\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"Changesets 自动生成CHANGELOG.md\\n 一、Changesets是什么\\n 1. 简介\\nChangesets 是一个专为 monorepo 项目设计的版本管理和变更日志生成工具。与 Standard-Version 不同，Changesets 采用手动创建变更集（changeset）的方式，让开发者能够精确控制每个版本包含的变更内容。它特别适合多包管理的复杂项目，提供更灵活的版本控制策略。\\nChangesets 的核心思想是\\\"变更集驱动\\\"——开发者需要手动创建变更集文件来描述所做的更改，然后工具会根据这些变更集自动更新版本号、生成变更日志，并处理包之间的依赖关系。\\n核心特点：\\n\"},{\"url\":\"/sdoc/01-开发/\",\"relativePath\":\"/sdoc/01-开发/\",\"frontmatter\":{\"title\":\"开发\",\"date\":\"2025-08-30 22:11:55\",\"permalink\":\"/docs/126b038aaf6336ea02ae0375\",\"icon\":\"laptop-code\",\"layout\":\"page\",\"catalogue\":true,\"path\":\"sdoc/01-开发\",\"tdoc\":{\"detailDate\":{},\"fulluuid\":\"a02ae03759f5413bb957056168894f57\",\"useduuid\":\"a02ae0375\"}},\"author\":{\"name\":\"苏木\"},\"title\":\"开发\",\"date\":\"2025-08-30 22:11:55\",\"capture\":\"这里是主题开发过程中的一些笔记。\"},{\"url\":\"/Examples/api-examples.html\",\"relativePath\":\"/Examples/api-examples.html\",\"frontmatter\":{\"outline\":\"deep\"},\"author\":{\"name\":\"苏
